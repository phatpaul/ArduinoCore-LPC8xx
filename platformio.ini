; ArduinoCore-LPC8xx PlatformIO / fbuild fixture.
;
; Drives the Arduino core in this repo via PlatformIO. Uses the forked
; `platform-nxplpc-arduino` platform (https://github.com/zackees/platform-nxplpc-arduino)
; which is the upstream `nxplpc` platform plus an Arduino framework binding
; pointing at this repo's `framework-arduino-lpc8xx` package.
;
; Tracking issue for native fbuild support: https://github.com/FastLED/fbuild/issues/513.
;
; Usage:
;   pio run -e lpc845brk
;   fbuild build . -e lpc845brk
;
; Board manifests are auto-discovered from ./boards/*.json (default
; `boards_dir`); no override needed.

[platformio]
default_envs = lpc845brk
src_dir = examples/Blink

[env]
platform = https://github.com/zackees/platform-nxplpc-arduino.git
framework = arduino
upload_protocol = cmsis-dap
debug_tool = cmsis-dap

[env:lpc845brk]
board = lpc845brk
board_build.ldscript = ${platformio.packages_dir}/framework-arduino-lpc8xx/linker_scripts/gcc/lpc845_flash.ld

[env:lpcxpresso804]
board = lpcxpresso804
board_build.ldscript = ${platformio.packages_dir}/framework-arduino-lpc8xx/linker_scripts/gcc/lpc804_flash.ld

[env:lpcxpresso845max]
board = lpcxpresso845max
board_build.ldscript = ${platformio.packages_dir}/framework-arduino-lpc8xx/linker_scripts/gcc/lpc845_flash.ld
