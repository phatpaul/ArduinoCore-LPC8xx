; ArduinoCore-LPC8xx PlatformIO / fbuild fixture.
;
; This file lets PlatformIO and fbuild drive the Arduino core in this repo.
; PlatformIO has no native LPC8xx platform yet — see FastLED/fbuild#513 —
; so we sit on top of `platform = nxplpc` and override `platform_packages`
; to point at this repo's Arduino core.
;
; Builds via this fixture are currently expected to FAIL on CI: the upstream
; `nxplpc` platform doesn't ship an Arduino builder, and fbuild's LPC8xx
; orchestrator (Stage 2) is still pending. The workflows under
; .github/workflows/ run anyway so red badges accurately reflect the gap.
;
; Usage:
;   pio run -e lpc845brk
;   fbuild build . -e lpc845brk

[platformio]
default_envs = lpc845brk
src_dir = examples/Blink

[env]
platform = nxplpc
framework = arduino
platform_packages =
    framework-arduino-lpc8xx @ https://github.com/zackees/ArduinoCore-LPC8xx.git#main
boards_dir = ${platformio.packages_dir}/framework-arduino-lpc8xx/boards
build_unflags = -std=gnu++14
build_flags =
    -mcpu=cortex-m0plus
    -mthumb
    -Os
    -ffunction-sections
    -fdata-sections
    -fno-common
    -fno-rtti
    -fno-exceptions
    -fno-threadsafe-statics
    -fno-use-cxa-atexit
    -std=gnu++11
    -DARDUINO_ARCH_LPC8XX
upload_protocol = cmsis-dap
debug_tool = cmsis-dap

[env:lpc845brk]
board = lpc845brk
board_build.ldscript = ${platformio.packages_dir}/framework-arduino-lpc8xx/linker_scripts/gcc/lpc845_flash.ld

[env:lpcxpresso804]
board = lpcxpresso804
board_build.ldscript = ${platformio.packages_dir}/framework-arduino-lpc8xx/linker_scripts/gcc/lpc804_flash.ld

[env:lpcxpresso845max]
board = lpcxpresso845max
board_build.ldscript = ${platformio.packages_dir}/framework-arduino-lpc8xx/linker_scripts/gcc/lpc845_flash.ld
