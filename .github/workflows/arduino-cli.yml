name: arduino-cli

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      - name: Install ARM GCC tool package
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:sam
      - name: Link local hardware package
        run: |
          mkdir -p "$HOME/Arduino/hardware/zackees"
          ln -s "$GITHUB_WORKSPACE" "$HOME/Arduino/hardware/zackees/lpc8xx"
      - name: List LPC8xx boards
        run: arduino-cli board listall lpc8xx
      - name: Compile examples
        run: |
          set -euo pipefail
          for fqbn in \
            zackees:lpc8xx:lpc845brk \
            zackees:lpc8xx:lpcxpresso804 \
            zackees:lpc8xx:lpcxpresso845max
          do
            for sketch in \
              examples/Blink \
              examples/BlinkWithoutDelay \
              examples/Button \
              examples/AnalogReadSerial \
              examples/Fading \
              examples/ToneMelody \
              examples/Serial \
              examples/SPILoopback \
              examples/I2CScanner \
              examples/FastLEDClocklessSmoke \
              examples/FastLEDSpiSmoke
            do
              arduino-cli compile --fqbn "$fqbn" "$sketch"
            done
          done
